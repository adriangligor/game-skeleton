# uncrustify config for game-skeleton
# Language: C (also applied to Objective-C via the Makefile fmt target)

# --- Indentation ---
indent_columns = 4
indent_with_tabs = 0     # spaces only
indent_switch_case = 4   # indent case labels one level inside switch

# --- Switch/case formatting ---
nl_after_case = true     # newline after case label colon (code goes on next line)
nl_before_case = false   # newline before each case/default label
nl_before_break = force  # break on its own line, never sharing with prior statement

# --- Line endings ---
newlines = lf

# --- Spacing around pointers: Type *name (star with name) ---
sp_before_ptr_star = force   # int *p
sp_after_ptr_star = remove  # int *p, not int * p
sp_before_ptr_star_func = force   # Surface *func(...)
sp_after_ptr_star_func = remove

# --- Braces: K&R (opening brace on same line) ---
nl_fdef_brace = remove   # void foo() {
nl_if_brace = remove     # if (...) {
nl_else_brace = remove   # } else {
nl_for_brace = remove    # for (...) {
nl_while_brace = remove  # while (...) {
nl_switch_brace = remove # switch (...) {

# --- Space between control flow closing paren and opening brace ---
sp_sparen_brace = force  # if/for/while/switch (...) {

# --- Function call/definition parentheses: no space before ( ---
sp_func_call_paren = remove
sp_func_def_paren = remove
sp_func_proto_paren = remove

# --- Continuation line indentation ---
indent_align_paren = false          # don't align with opening paren
indent_continue = 4                 # indent continuation lines by 4 spaces
use_indent_continue_only_once = true  # apply indent_continue only once per statement
indent_ternary_operator = 1         # indent ternary ? and : with indent_continue (not aligned)

# --- Disable alignment padding ---
align_pp_define_span = 0  # no padding to align #define values
align_assign_span = 0     # no padding to align = signs
sp_before_assign = force   # remove extra spaces before =
sp_after_assign = force    # remove extra spaces after =
sp_type_func = force       # single space between return type and function name

# --- Always use blocks for control flow (rule: never braceless single-statement bodies) ---
mod_full_brace_if = add
mod_full_brace_for = add
mod_full_brace_while = add
mod_full_brace_do = add

# --- Return statements: blank line before return when preceded by other code ---
nl_before_return = true

# --- Multi-line calls/structs: closing delimiter on its own line at opening indentation ---
indent_paren_close = 2

# --- Comments: no column-alignment of trailing comments across lines ---
align_right_cmt_span = 0
