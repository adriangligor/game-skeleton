# uncrustify config for game-skeleton
# Language: C (also applied to Objective-C via the Makefile fmt target)

# --- Indentation ---
indent_columns        = 4
indent_with_tabs      = 0     # spaces only
indent_switch_case    = 4     # indent case labels one level inside switch

# --- Line endings ---
newlines              = lf

# --- Spacing around pointers: Type *name (star with name) ---
sp_before_ptr_star      = force   # int *p
sp_after_ptr_star       = remove  # int *p, not int * p
sp_before_ptr_star_func = force   # Surface *func(...)
sp_after_ptr_star_func  = remove

# --- Braces: K&R (opening brace on same line) ---
nl_fdef_brace    = remove   # void foo() {
nl_if_brace      = remove   # if (...) {
nl_else_brace    = remove   # } else {
nl_for_brace     = remove   # for (...) {
nl_while_brace   = remove   # while (...) {
nl_switch_brace  = remove   # switch (...) {

# --- Function call/definition parentheses: no space before ( ---
sp_func_call_paren = remove
sp_func_def_paren  = remove
sp_func_proto_paren = remove
